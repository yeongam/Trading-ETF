<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>토스증권 자동매매</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        h1 { font-size: 24px; margin-bottom: 24px; color: #58a6ff; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 20px; margin-bottom: 16px; }
        .card h2 { font-size: 16px; color: #8b949e; margin-bottom: 12px; }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 13px; font-weight: 600; }
        .status-running { background: #1a4731; color: #3fb950; }
        .status-stopped { background: #4a1e1e; color: #f85149; }
        .status-dry { background: #3d2e00; color: #d29922; }
        .btn { padding: 8px 20px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 500; margin-right: 8px; }
        .btn-primary { background: #238636; color: #fff; }
        .btn-danger { background: #da3633; color: #fff; }
        .btn-secondary { background: #30363d; color: #e6edf3; }
        .btn:hover { opacity: 0.85; }
        .controls { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #21262d; font-size: 14px; }
        th { color: #8b949e; font-weight: 500; }
        .trade-buy { color: #f85149; }
        .trade-sell { color: #58a6ff; }
        .trade-hold { color: #8b949e; }
        #trade-log { max-height: 400px; overflow-y: auto; }
        .settings-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .settings-row label { width: 100px; color: #8b949e; font-size: 14px; }
        .settings-row input { background: #0d1117; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 4px; font-size: 14px; }
        .settings-row input[type="checkbox"] { width: 18px; height: 18px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>토스증권 자동매매 대시보드</h1>

        <div class="card">
            <h2>상태</h2>
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                <span id="status-badge" class="status-badge status-stopped">중지됨</span>
                <span id="dry-badge" class="status-badge status-dry" style="display:none">모의매매</span>
            </div>
            <div class="controls">
                <button class="btn btn-primary" onclick="startBot()">시작</button>
                <button class="btn btn-danger" onclick="stopBot()">중지</button>
                <button class="btn btn-secondary" onclick="runOnce()">1회 실행</button>
            </div>
        </div>

        <div class="card">
            <h2>설정</h2>
            <div class="settings-row">
                <label>감시 종목</label>
                <input type="text" id="watchlist" placeholder="005930,035720" style="width:300px">
            </div>
            <div class="settings-row">
                <label>확인 주기(초)</label>
                <input type="number" id="interval" value="10" min="1" style="width:80px">
            </div>
            <div class="settings-row">
                <label>모의매매</label>
                <input type="checkbox" id="dry-run" checked>
            </div>
            <button class="btn btn-secondary" onclick="saveConfig()" style="margin-top:8px">설정 저장</button>
        </div>

        <div class="card">
            <h2>리스크 관리</h2>
            <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px;">
                <div>
                    <div style="color:#8b949e;font-size:12px">보유 종목</div>
                    <div id="risk-positions" style="font-size:20px;font-weight:600">0</div>
                </div>
                <div>
                    <div style="color:#8b949e;font-size:12px">일일 손익</div>
                    <div id="risk-pnl" style="font-size:20px;font-weight:600">0%</div>
                </div>
                <div>
                    <div style="color:#8b949e;font-size:12px">총 거래</div>
                    <div id="risk-trades" style="font-size:20px;font-weight:600">0</div>
                </div>
                <div>
                    <div style="color:#8b949e;font-size:12px">승률</div>
                    <div id="risk-winrate" style="font-size:20px;font-weight:600">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2>매매 이력</h2>
            <div id="trade-log">
                <table>
                    <thead><tr><th>시각</th><th>종목</th><th>구분</th><th>수량</th><th>사유</th><th>결과</th></tr></thead>
                    <tbody id="trade-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const badge = document.getElementById('status-badge');
                const dryBadge = document.getElementById('dry-badge');
                if (data.running) {
                    badge.textContent = '실행 중';
                    badge.className = 'status-badge status-running';
                } else {
                    badge.textContent = '중지됨';
                    badge.className = 'status-badge status-stopped';
                }
                dryBadge.style.display = data.dry_run ? 'inline-block' : 'none';
                document.getElementById('watchlist').value = (data.watchlist || []).join(',');
                document.getElementById('interval').value = data.check_interval || 10;
                document.getElementById('dry-run').checked = data.dry_run;
                // 리스크 통계
                const rs = data.risk_stats || {};
                document.getElementById('risk-positions').textContent = rs.active_positions || 0;
                const pnl = rs.daily_pnl || 0;
                const pnlEl = document.getElementById('risk-pnl');
                pnlEl.textContent = pnl.toFixed(1) + '%';
                pnlEl.style.color = pnl >= 0 ? '#3fb950' : '#f85149';
                document.getElementById('risk-trades').textContent = rs.total_trades || 0;
                document.getElementById('risk-winrate').textContent = rs.total_trades > 0 ? rs.win_rate.toFixed(1) + '%' : '-';
            } catch (e) { console.error(e); }
        }

        async function fetchTrades() {
            try {
                const res = await fetch('/api/trades');
                const data = await res.json();
                const tbody = document.getElementById('trade-body');
                tbody.innerHTML = data.trades.slice(-50).reverse().map(t => `
                    <tr>
                        <td>${t.timestamp?.slice(11, 19) || '-'}</td>
                        <td>${t.code}</td>
                        <td class="trade-${t.type}">${t.type}</td>
                        <td>${t.quantity}</td>
                        <td>${t.reason}</td>
                        <td>${t.success ? '성공' : '실패'} ${t.dry_run ? '(모의)' : ''}</td>
                    </tr>`).join('');
            } catch (e) { console.error(e); }
        }

        async function startBot() {
            await fetch('/api/start', { method: 'POST' });
            setTimeout(fetchStatus, 500);
        }
        async function stopBot() {
            await fetch('/api/stop', { method: 'POST' });
            setTimeout(fetchStatus, 500);
        }
        async function runOnce() {
            await fetch('/api/run-once', { method: 'POST' });
            setTimeout(fetchTrades, 1000);
        }
        async function saveConfig() {
            const watchlist = document.getElementById('watchlist').value.split(',').map(s => s.trim()).filter(Boolean);
            const check_interval = parseInt(document.getElementById('interval').value) || 10;
            const dry_run = document.getElementById('dry-run').checked;
            await fetch('/api/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ watchlist, check_interval, dry_run }),
            });
            fetchStatus();
        }

        fetchStatus();
        fetchTrades();
        setInterval(fetchStatus, 5000);
        setInterval(fetchTrades, 5000);
    </script>
</body>
</html>
